name: 'Bulki Image Optimizer'
description: 'Compress, resize, and convert images (JPEG, PNG, WebP, AVIF) in CI/CD. Fast, free, no API keys.'
author: 'PuntoyComaTech'

branding:
  icon: 'image'
  color: 'orange'

inputs:
  path:
    description: 'File or directory to optimize'
    required: true
  format:
    description: 'Output format: jpeg, png, webp, gif, avif'
    required: false
  quality:
    description: 'Output quality (1-100)'
    required: false
    default: '70'
  resize:
    description: 'Max width in pixels'
    required: false
  max-size:
    description: 'Fail if any output exceeds this size (e.g., 200kb, 1mb)'
    required: false
  destination:
    description: 'Output base directory'
    required: false
    default: '.'
  output-folder:
    description: 'Output folder name'
    required: false
    default: 'bulki-output'

outputs:
  json:
    description: 'JSON results of the optimization'
    value: ${{ steps.bulki.outputs.json }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run bulki
      id: bulki
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_QUALITY: ${{ inputs.quality }}
        INPUT_RESIZE: ${{ inputs.resize }}
        INPUT_MAX_SIZE: ${{ inputs.max-size }}
        INPUT_DESTINATION: ${{ inputs.destination }}
        INPUT_OUTPUT_FOLDER: ${{ inputs.output-folder }}
      run: |
        ARGS="compress \"$INPUT_PATH\" -q \"$INPUT_QUALITY\""

        [ -n "$INPUT_FORMAT" ] && ARGS="$ARGS -f \"$INPUT_FORMAT\""
        [ -n "$INPUT_RESIZE" ] && ARGS="$ARGS -r \"$INPUT_RESIZE\""
        [ -n "$INPUT_MAX_SIZE" ] && ARGS="$ARGS --max-size \"$INPUT_MAX_SIZE\""
        [ "$INPUT_DESTINATION" != "." ] && ARGS="$ARGS -d \"$INPUT_DESTINATION\""
        [ "$INPUT_OUTPUT_FOLDER" != "bulki-output" ] && ARGS="$ARGS -o \"$INPUT_OUTPUT_FOLDER\""

        ARGS="$ARGS --json"

        RESULT=$(npx --yes @puntoycoma/bulki $ARGS)

        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "json<<$EOF" >> $GITHUB_OUTPUT
        echo "$RESULT" >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

        node -e "
          const d = JSON.parse(process.argv[1]);
          const s = d.summary;
          console.log('Optimized ' + s.totalFiles + ' files | ' + Math.round(s.totalOriginalSize/1024) + ' KB -> ' + Math.round(s.totalNewSize/1024) + ' KB (' + s.totalReduction + '% reduction)');
          if (s.errors > 0) console.log('Errors: ' + s.errors);
        " "$RESULT"
